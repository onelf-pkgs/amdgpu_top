# Builds an onelf package from the upstream release.
#
# To reuse for another package, fork/copy this repo and change the
# env block + the arch matrix below. Everything else is generic.

name: Build

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  UPSTREAM_REPO: Umio-Yasuno/amdgpu_top
  BUILD_CONTAINER: debian:trixie-slim
  PKG_NAME: amdgpu_top

permissions:
  contents: write

jobs:
  check:
    name: Check upstream
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      skip: ${{ steps.check.outputs.skip }}
      container: ${{ steps.check.outputs.container }}
    steps:
      - name: Check for new version
        id: check
        run: |
          TAG=$(curl -sL "https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest" \
                | jq -r '.tag_name // empty')
          VERSION="${TAG#v}"

          if [ -z "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "$VERSION already exists, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "container=${BUILD_CONTAINER}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.arch.name }}
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ${{ matrix.arch.runner }}
    container:
      image: ${{ needs.check.outputs.container }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: x86_64
            runner: ubuntu-latest
            asset_glob: "amdgpu-top_[0-9]*_amd64.deb"
            onelf_asset: onelf-x86_64-linux
            zsyncmake_asset: zsyncmake-x86_64-linux
          - name: aarch64
            runner: ubuntu-24.04-arm
            asset_glob: "amdgpu-top_[0-9]*_arm64.deb"
            onelf_asset: onelf-aarch64-linux
            zsyncmake_asset: zsyncmake-aarch64-linux
    steps:
      - name: Install tools
        run: |
          apt-get update -qq
          apt-get install -y -qq curl file jq binutils

      - uses: actions/checkout@v4

      - name: Install soar + onelf + zsyncmake
        run: |
          # soar
          curl -sL "https://github.com/pkgforge/soar/releases/latest/download/soar-${{ matrix.arch.name }}-linux" -o /usr/local/bin/soar
          chmod +x /usr/local/bin/soar

          # onelf
          soar dl --github QaidVoid/onelf \
            -g "${{ matrix.arch.onelf_asset }}" \
            -o /usr/local/bin/onelf -q
          chmod +x /usr/local/bin/onelf

          # zsyncmake
          soar dl --github QaidVoid/zsync-rs \
            -g "${{ matrix.arch.zsyncmake_asset }}" \
            -o /usr/local/bin/zsyncmake -q
          chmod +x /usr/local/bin/zsyncmake

      - name: Fetch upstream asset
        run: |
          soar dl --github "${UPSTREAM_REPO}" \
            -g "${{ matrix.arch.asset_glob }}" \
            -o /tmp/upstream-asset -q

      - name: Build
        run: |
          export PKG_VERSION="${{ needs.check.outputs.version }}"
          export DEB_PATH="/tmp/upstream-asset"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.arch.name }}
          path: |
            **/*.onelf
            **/*.zsync

  release:
    name: Release
    needs: [check, build]
    if: needs.check.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Collect and rename artifacts
        run: |
          shopt -s nullglob
          mkdir -p release
          for dir in ${PKG_NAME}-*/; do
            # Artifact dir name is <PKG_NAME>-<arch>
            arch="${dir#${PKG_NAME}-}"
            arch="${arch%/}"
            for f in "$dir"**/*.onelf; do
              mv "$f" "release/${PKG_NAME}-${arch}.onelf"
            done
            for f in "$dir"**/*.zsync; do
              mv "$f" "release/${PKG_NAME}-${arch}.onelf.zsync"
            done
          done
          ls -lh release/ 2>/dev/null || true

      - name: Create release
        run: |
          shopt -s nullglob
          FILES=(release/*)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No artifacts found"
            exit 1
          fi
          gh release create "${{ needs.check.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "${PKG_NAME} ${{ needs.check.outputs.version }}" \
            --notes "Automated onelf build of ${PKG_NAME} v${{ needs.check.outputs.version }}." \
            "${FILES[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
