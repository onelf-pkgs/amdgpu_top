# Builds an onelf package from the upstream release.
#
# To reuse for another package, fork/copy this repo and change the
# env block + the arch matrix below. Everything else is generic.

name: Build

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  # -- Change these per package --
  UPSTREAM_REPO: Umio-Yasuno/amdgpu_top
  BUILD_CONTAINER: debian:trixie-slim
  PKG_NAME: amdgpu_top

permissions:
  contents: write

jobs:
  check:
    name: Check upstream
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      skip: ${{ steps.check.outputs.skip }}
      container: ${{ steps.check.outputs.container }}
    steps:
      - name: Check for new version
        id: check
        run: |
          RELEASE=$(curl -sL "https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest")
          TAG=$(echo "$RELEASE" | jq -r '.tag_name // empty')
          VERSION="${TAG#v}"

          if [ -z "$VERSION" ]; then
            echo "No upstream release found"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "$VERSION already exists, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "container=${BUILD_CONTAINER}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.arch.name }}
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ${{ matrix.arch.runner }}
    container:
      image: ${{ needs.check.outputs.container }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: x86_64
            runner: ubuntu-latest
            asset_pattern: "amdgpu-top_.*_amd64\\.deb"
            onelf_asset: onelf-x86_64-linux
          - name: aarch64
            runner: ubuntu-24.04-arm
            asset_pattern: "amdgpu-top_.*_arm64\\.deb"
            onelf_asset: onelf-aarch64-linux
    steps:
      - name: Install tools
        run: |
          apt-get update -qq
          apt-get install -y -qq curl jq file

      - uses: actions/checkout@v4

      - name: Install onelf + zsyncmake
        run: |
          ARCH="${{ matrix.arch.name }}"
          # onelf
          URL=$(curl -sL https://api.github.com/repos/QaidVoid/onelf/releases/latest \
                | jq -r --arg name "${{ matrix.arch.onelf_asset }}" \
                  '.assets[] | select(.name == $name) | .browser_download_url')
          curl -sL -o /usr/local/bin/onelf "$URL"
          chmod +x /usr/local/bin/onelf
          # zsyncmake (from zsync-rs)
          URL=$(curl -sL https://api.github.com/repos/QaidVoid/zsync-rs/releases/latest \
                | jq -r --arg name "zsyncmake-${ARCH}-linux" \
                  '.assets[] | select(.name == $name) | .browser_download_url')
          curl -sL -o /usr/local/bin/zsyncmake "$URL"
          chmod +x /usr/local/bin/zsyncmake

      - name: Fetch upstream asset
        run: |
          RELEASE=$(curl -sL "https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest")
          ASSET_URL=$(echo "$RELEASE" | jq -r \
            --arg pat "${{ matrix.arch.asset_pattern }}" \
            '[.assets[] | select(.name | test($pat))] | first | .browser_download_url // empty')
          if [ -z "$ASSET_URL" ]; then
            echo "No asset matching ${{ matrix.arch.asset_pattern }}"
            exit 1
          fi
          curl -sL -o /tmp/upstream-asset "$ASSET_URL"

      - name: Build
        run: |
          export PKG_VERSION="${{ needs.check.outputs.version }}"
          export DEB_PATH="/tmp/upstream-asset"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.arch.name }}
          path: |
            **/*.onelf
            **/*.zsync

  release:
    name: Release
    needs: [check, build]
    if: needs.check.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Rename artifacts per arch
        run: |
          shopt -s nullglob
          for f in **/*.onelf; do
            dir=$(dirname "$f")
            base=$(basename "$f" .onelf)
            case "$dir" in
              *x86_64*|*amd64*) arch="x86_64" ;;
              *aarch64*|*arm64*) arch="aarch64" ;;
              *) arch="unknown" ;;
            esac
            mv "$f" "${base}-${arch}.onelf"
            # Move matching zsync if present
            zsync="${f}.zsync"
            [ -f "$zsync" ] && mv "$zsync" "${base}-${arch}.onelf.zsync"
          done
          ls -lh *.onelf *.zsync 2>/dev/null || true

      - name: Create release
        run: |
          shopt -s nullglob
          FILES=(*.onelf *.zsync)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No artifacts found"
            exit 1
          fi
          gh release create "${{ needs.check.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "${PKG_NAME} ${{ needs.check.outputs.version }}" \
            --notes "Automated onelf build of ${PKG_NAME} v${{ needs.check.outputs.version }}." \
            "${FILES[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
